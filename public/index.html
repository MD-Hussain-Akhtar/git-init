<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chat App</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  /* Hide scrollbar */
  #messages::-webkit-scrollbar { display: none; }
  #messages { -ms-overflow-style: none; scrollbar-width: none; }
</style>
</head>

<body class="bg-gray-100 h-screen flex flex-col">

<!-- Login Screen -->
<div id="loginDiv" class="flex flex-col items-center justify-center h-full">
  <input id="usernameInput" placeholder="Enter name" class="p-3 border rounded mb-3">
  <button id="loginBtn" class="bg-green-500 text-white px-6 py-2 rounded">Join</button>
</div>

<!-- Chat Screen -->
<div id="chatDiv" class="hidden flex flex-col fixed top-0 bottom-0 w-full bg-gray-100">

  <!-- Header -->
  <div class="bg-green-500 text-white p-4 text-lg font-semibold shadow">Chat Room</div>

  <!-- Messages Area -->
  <ul id="messages" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-100">
    <!-- Messages will appear here -->
  </ul>

  <!-- Input Area -->
  <div class="bg-white p-3 flex items-center gap-2 border-t">
    <!-- Image Upload -->
    <label class="cursor-pointer bg-gray-200 p-2 rounded-full hover:bg-gray-300">📎
      <input type="file" id="imageInput" accept="image/*" class="hidden">
    </label>

    <!-- Message Input -->
    <input id="messageInput"
      class="flex-1 px-4 py-2 rounded-full border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500"
      placeholder="Type a message...">

    <!-- Voice Button -->
    <button id="recordBtn" class="bg-gray-200 p-3 rounded-full hover:bg-gray-300">🎤</button>

    <!-- Send Button -->
    <button id="sendBtn" class="bg-green-500 text-white p-3 rounded-full hover:bg-green-600 transition">➤</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

let username = "";
let mediaRecorder;
let audioChunks = [];

const loginDiv = document.getElementById("loginDiv");
const chatDiv = document.getElementById("chatDiv");
const usernameInput = document.getElementById("usernameInput");
const loginBtn = document.getElementById("loginBtn");

const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const messages = document.getElementById("messages");

const recordBtn = document.getElementById("recordBtn");
const imageInput = document.getElementById("imageInput");

// Login
loginBtn.onclick = () => {
  username = usernameInput.value.trim();
  if(!username) return alert("Enter name");
  socket.emit("set username", { username });
  loginDiv.style.display = "none";
  chatDiv.style.display = "flex";
};

// Send text
sendBtn.onclick = () => {
  const msg = messageInput.value.trim();
  if(!msg) return;
  socket.emit("chat message", { username, message: msg });
  messageInput.value = "";
};

// TEXT MESSAGE
socket.on("chat message", (data) => {
  const li = document.createElement("li");
  li.classList.add("flex", "mb-2");

  const bubble = document.createElement("div");
  bubble.classList.add("p-3", "rounded-2xl", "max-w-xs", "shadow");

  const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  const timeDiv = document.createElement("div");
  timeDiv.classList.add("text-xs", "mt-1", "text-right", "opacity-70");
  timeDiv.textContent = time;

  if(data.username === username){
    li.classList.add("justify-end");
    bubble.classList.add("bg-green-500", "text-white", "rounded-br-none");
    bubble.textContent = data.message;
  } else {
    li.classList.add("justify-start");
    bubble.classList.add("bg-white", "text-black", "rounded-bl-none");
    bubble.innerHTML = `<strong>${data.username}</strong><br>${data.message}`;
  }

  bubble.appendChild(timeDiv);
  li.appendChild(bubble);
  messages.appendChild(li);
  messages.scrollTop = messages.scrollHeight;
});

// VOICE MESSAGE
recordBtn.addEventListener("click", async () => {
  if(!mediaRecorder || mediaRecorder.state === "inactive"){
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.start();
    recordBtn.textContent = "⏹️";

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks, { type:"audio/webm" });
      audioChunks = [];
      const reader = new FileReader();
      reader.onload = () => socket.emit("voice message",{ username, audio: reader.result });
      reader.readAsDataURL(blob);
    };
  } else {
    mediaRecorder.stop();
    recordBtn.textContent = "🎤";
  }
});

socket.on("voice message", (data)=>{
  const li = document.createElement("li");
  li.classList.add("flex","mb-2");

  const bubble = document.createElement("div");
  bubble.classList.add("p-3","rounded-2xl","shadow","max-w-xs");

  const audio = document.createElement("audio");
  audio.controls = true;
  audio.src = data.audio;

  if(data.username === username){
    li.classList.add("justify-end");
    bubble.classList.add("bg-green-500");
  } else {
    li.classList.add("justify-start");
    bubble.classList.add("bg-white");
  }

  bubble.appendChild(audio);
  li.appendChild(bubble);
  messages.appendChild(li);
  messages.scrollTop = messages.scrollHeight;
});

// IMAGE MESSAGE
imageInput.addEventListener("change", ()=>{
  const file = imageInput.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=> socket.emit("image message",{ username, image: reader.result });
  reader.readAsDataURL(file);
});

socket.on("image message",(data)=>{
  const li = document.createElement("li");
  li.classList.add("flex","mb-2");

  const bubble = document.createElement("div");
  bubble.classList.add("p-2","rounded-2xl","shadow","max-w-xs");

  const img = document.createElement("img");
  img.src = data.image;
  img.classList.add("rounded-xl","max-w-full");

  if(data.username === username){
    li.classList.add("justify-end");
    bubble.classList.add("bg-green-500");
  } else {
    li.classList.add("justify-start");
    bubble.classList.add("bg-white");
  }

  bubble.appendChild(img);
  li.appendChild(bubble);
  messages.appendChild(li);
  messages.scrollTop = messages.scrollHeight;
});
</script>
</body>
</html>
